/* Banner */

.banner {

width:100%;

display:block;

}



/* Navigation */

nav {

background:rgba(0,0,0,0.9);

padding:20px;

display:flex;

justify-content:center;

flex-wrap:wrap;

gap:15px;

}



nav a {

background:linear-gradient(#500000,#160000);

color:white;

text-decoration:none;

padding:12px 25px;

border:2px solid #900000;

border-radius:8px;

box-shadow:0 0 10px black;

font-weight:bold;

}



nav a:hover {

background:#900000;

}



/* Main Film Section */


.film-section {

width:80%;

margin:40px auto;

padding:30px;

background:rgba(0,0,0,0.85);

border:3px solid #600000;

box-shadow:0 0 20px black;

}




h1,
h2 {

text-align:center;

color:#b00000;

text-shadow:2px 2px black;

}




p {

font-size:18px;

line-height:1.7;

}




/* Film Introduction */


.film-intro {

display:flex;

align-items:center;

gap:40px;

padding:25px;

background:rgba(20,0,0,0.75);

border:2px solid #700000;

}





.poster-box {

width:60%;

}


  
.poster-box img {

width:100%;

height:auto;

object-fit:contain;

border:3px solid #900000;

box-shadow:0 0 15px black;

}



.film-text {

width:65%;

}




.film-text h2 {

text-align:left;

}





/* Mobile */


@media(max-width:800px){


.film-section {

width:90%;

}



.film-intro {

flex-direction:column;

}



.poster-box,
.film-text {

width:100%;

}



.poster-box img {

height:auto;

}


}
